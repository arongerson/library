<div class="container">
  <div class="wrapper">
    <h2>{{title}}</h2>
    <div class="feedback {{feedbackClass}}" [hidden]="!feedback">{{feedback}}</div>
    <form [formGroup]="form" class="form">
      <mat-form-field>
        <input matInput placeholder="Title" [formControl]="form.controls.title" >
        <mat-error *ngIf="form.controls.title.invalid">
          {{getErrorMessage(form.controls.title)}}
        </mat-error>
      </mat-form-field>
      <mat-form-field>
        <input matInput placeholder="Author" [formControl]="form.controls.author" >
        <mat-error *ngIf="form.controls.author.invalid">
          {{getErrorMessage(form.controls.author)}}
        </mat-error>
      </mat-form-field>
      <mat-form-field>
        <input matInput placeholder="ISBN" [formControl]="form.controls.isbn" >
        <mat-error *ngIf="form.controls.isbn.invalid">
          {{getErrorMessage(form.controls.isbn)}}
        </mat-error>
      </mat-form-field>
      <mat-form-field *ngIf="!isEdit">
        <input matInput placeholder="Number of copies" [formControl]="form.controls.copies" >
        <mat-error *ngIf="form.controls.copies.invalid">
          {{getErrorMessage(form.controls.copies)}}
        </mat-error>
      </mat-form-field>
      <div class="button-row">
        <button mat-raised-button
                color="accent"
                (click)="go()"
                [disabled]="form.invalid || submitted" >
          <img src="assets/svg/loading.svg" alt="..." [hidden]="!submitted">
          <span>Go</span>
        </button>
      </div>
    </form>
  </div>
</div>
