<div class="body">
    <div class="section">
        <div class="mat-h2 mat-title title">Sign In</div>
        <div class="content">
          <div class="mat-h4 {{feedbackClass}}" [hidden]="!feedback">{{feedback}}</div>
          <form [formGroup]="form" class="form">
            <mat-form-field>
              <input matInput placeholder="Username" [formControl]="form.controls.username" required>
              <mat-error *ngIf="form.controls.username.invalid">
                {{getErrorMessage(form.controls.username)}}
              </mat-error>
            </mat-form-field>
            <mat-form-field>
              <input matInput placeholder="Password" [type]="hide ? 'password' : 'text'" [formControl]="form.controls.password" required>
              <mat-icon matSuffix (click)="hide = !hide">{{hide ? 'visibility' : 'visibility_off'}}</mat-icon>
              <mat-error *ngIf="form.controls.password.invalid">
                {{getErrorMessage(form.controls.password)}}
              </mat-error>
            </mat-form-field>
            <div class="button-row">
              <button mat-raised-button color="accent" (click)="login()" [disabled]="form.invalid" *ngIf="!submitted">
                <img src="assets/svg/loading.svg" alt="..." [hidden]="!submitted"><span>Login</span>
              </button>
            </div>
          </form>
        </div>
    </div>
  </div>
